<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ph Job Deshboard </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>   
        <div class="header">
            <h1>Job Board</h1>
        </div>
</header>
 
<section>
    <div class="dashboard">
        <div class="dashboard-card">
            <h3>Total Jobs</h3>
            <span id="totalCount">0</span>
        </div>
  <div class="dashboard-card">
    <h3>Interview</h3>
    <span id="interviewCount">0</span>
  </div>
  <div class="dashboard-card">
    <h3>Rejected</h3>
    <span id="rejectedCount">0</span>
  </div>
</div>
</section>
<section>
    <div class="section-header">
        <h2>Available Jobs</h2>
        <span id="sectionCount">0 Jobs</span>
    </div>
</section>
<section>
    <div class="tabs">
        <div class="tab active" data-tab="All">All</div>
        <div class="tab" data-tab="Interview">Interview</div>
        <div class="tab" data-tab="Rejected">Rejected</div>
    </div>
</section>


<div class="cards" id="jobContainer"></div>









<script src="script.js"></script>
</body>
</html>
